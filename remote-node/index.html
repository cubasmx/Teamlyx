<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login al Dashboard">
    <title>Inicia Sesión | Teamlyx Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body data-theme="apple-dark">
    <div class="background-anim"></div>
    <main class="login-container">
        
        <div class="login-left">
            <div class="login-header">
                <h1>Inicia Sesión</h1>
                <p>Accede a todos los servicios de forma segura y centralizada.</p>
                <div class="register-text">
                    Teamlyx Access Control
                </div>
            </div>
            <img src="assets/login_illustration.png" alt="Tech Illustration" class="login-illustration" />
        </div>

        <div class="login-right glass-panel">
            <h2 class="form-title">Ingresa a tu cuenta</h2>
            
            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="username" placeholder="Email o usuario" required>
                </div>
                
                <div class="input-group pass-group">
                    <input type="password" id="password" placeholder="Contraseña" required>
                    <button type="button" class="icon-btn pass-toggle" onclick="togglePassword()">👁</button>
                </div>
                
                <!-- 2FA Field -->
                <div class="input-group tfa-group" id="tfaGroup" style="display: none;">
                    <input type="text" id="tfaCode" placeholder="Código 2FA (Ej: 123456)" maxlength="6">
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="use2fa" onchange="document.getElementById('tfaGroup').style.display = this.checked ? 'block' : 'none'">
                        Usar Doble Factor
                    </label>
                    <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Inicia sesión</button>
            </form>
        </div>

    </main>

    <script>
        function togglePassword() {
            var passInput = document.getElementById('password');
            if (passInput.type === 'password') {
                passInput.type = 'text';
            } else {
                passInput.type = 'password';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const originalText = btn.textContent;
            btn.textContent = 'Iniciando...';
            btn.disabled = true;

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const use2fa = document.getElementById('use2fa').checked;
            const tfaCode = use2fa ? document.getElementById('tfaCode').value : null;

            try {
                // Peticion directa a la api del mismo puerto
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, totp_code: tfaCode })
                });

                const data = await response.json();

                if (!response.ok) {
                    alert(data.error || 'Fallo al iniciar sesión');
                } else {
                    // Guardar token y redirigir
                    localStorage.setItem('teamlyx_token', data.token);
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                alert('No se pudo conectar con el servidor.');
                console.error(err);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
